###############################################################################
# Mounts secrets from Azure Key Vault via the CSI Secrets Store driver.
# Uses Workload Identity (AKS addon) to authenticate to Key Vault.
###############################################################################
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: orders-api-kv
  namespace: orders
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "REPLACE-WITH-UAMI-CLIENT-ID"
    keyvaultName: "REPLACE-WITH-KEYVAULT-NAME"
    cloudName: "AzurePublicCloud"
    tenantId: "REPLACE-WITH-TENANT-ID"
    objects: |
      array:
        - |
          objectName: db-connection
          objectType: secret
        - |
          objectName: jwt-signing-key
          objectType: secret
  secretObjects:
    - secretName: orders-api-secrets
      type: Opaque
      data:
        - objectName: db-connection
          key: ConnectionStrings__OrdersDb
        - objectName: jwt-signing-key
          key: Jwt__SigningKey
