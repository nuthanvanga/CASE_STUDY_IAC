###############################################################################
# Azure DevOps Pipeline: Infrastructure (Terraform)
#
# Per-env Terraform stacks live under terraform/envs/<env>/. Each env has its
# own main.tf / variables.tf / outputs.tf / providers.tf and references the
# shared modules at terraform/modules/. The pipeline switches envs by
# changing the working directory.
#
# Backend coordinates (rg / storage account / container / state-blob key) are
# pulled from a per-env bootstrap Key Vault at init time -- nothing about the
# state location is hard-coded in this YAML or in source control.
#
# Stages:
#   - Validate : fmt, validate (no backend), tflint, tfsec, checkov
#   - Plan     : fetch backend coords from KV -> init -> plan -> publish
#   - Apply    : manual approval (Azure DevOps environment), download plan,
#                fetch backend coords from KV -> init -> apply
#
# Auth: Workload Identity Federation (OIDC) via per-env service connections.
# No long-lived secrets in the pipeline.
#
# Agent pools:
#   Validate runs on Microsoft-hosted agents (no private network needed).
#   Plan / Apply default to Microsoft-hosted but can switch to a self-hosted
#   pool inside the spoke VNet via `useSelfHostedAgents = true`. Use that
#   when the bootstrap KV or state storage account is reachable only via
#   private endpoint, or when running against a private AKS cluster from
#   later helm/kubectl tasks.
###############################################################################

parameters:
  - name: targetEnv
    displayName: 'Target environment'
    type: string
    default: 'dev'
    values:
      - dev
      - staging
      - prod

  - name: useSelfHostedAgents
    displayName: 'Use self-hosted agents for Plan/Apply (required when state KV or SA are PE-only)'
    type: boolean
    default: false

  - name: selfHostedPoolName
    displayName: 'Self-hosted agent pool name'
    type: string
    default: 'aks-agents-uaen'

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - pipelines/azure-pipelines-terraform.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

variables:
  - name: TF_VERSION
    value: '1.7.5'
  - name: TF_MODULES_ROOT
    value: '$(System.DefaultWorkingDirectory)/terraform'
  - name: targetEnv
    value: ${{ parameters.targetEnv }}
  - name: WORKING_DIR
    value: '$(System.DefaultWorkingDirectory)/terraform/envs/${{ parameters.targetEnv }}'
  - name: SERVICE_CONNECTION
    value: 'azurerm-${{ parameters.targetEnv }}-oidc'
  - name: APPROVAL_ENV
    value: '${{ parameters.targetEnv }}-infra'
  - group: prodgrp

  # Bootstrap Key Vault holding the Terraform backend coordinates for this env.
  # Created in advance per env (see docs/deployment-guide.md § 2). The service
  # principal behind $(SERVICE_CONNECTION) needs "Key Vault Secrets User" on it.
  - name: BACKEND_KV_NAME
    value: 'kv-tfstate-${{ parameters.targetEnv }}'

stages:
###############################################################################
# Validate stage - linting and security scans (always Microsoft-hosted)
###############################################################################
- stage: Validate
  displayName: 'Validate & Scan ($(targetEnv))'
  pool:
    vmImage: 'ubuntu-latest'
  jobs:
    - job: validate
      displayName: 'fmt / validate / tflint / tfsec / checkov'
      steps:
        - checkout: self
          fetchDepth: 1

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: '$(TF_VERSION)'

        - script: terraform fmt -check -recursive
          displayName: 'terraform fmt -check'
          workingDirectory: '$(TF_MODULES_ROOT)'

        - script: |
            cd $(WORKING_DIR)
            terraform init -backend=false
            terraform validate
          displayName: 'terraform init (no backend) + validate'

        - script: |
            curl -sL https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip -o tflint.zip
            unzip -o tflint.zip
            sudo mv tflint /usr/local/bin/
            tflint --init
            tflint --recursive
          displayName: 'tflint'
          workingDirectory: '$(TF_MODULES_ROOT)'

        - script: |
            curl -sL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o /usr/local/bin/tfsec
            chmod +x /usr/local/bin/tfsec
            tfsec --soft-fail $(TF_MODULES_ROOT)
          displayName: 'tfsec'

        - script: |
            pip install --quiet checkov
            checkov -d $(TF_MODULES_ROOT) --quiet --soft-fail
          displayName: 'checkov'

###############################################################################
# Plan stage - fetch backend config from KV, init, plan, publish artifact
###############################################################################
- stage: Plan
  displayName: 'Terraform Plan ($(targetEnv))'
  dependsOn: Validate
  condition: succeeded()
  pool:
    ${{ if parameters.useSelfHostedAgents }}:
      name: ${{ parameters.selfHostedPoolName }}
      demands:
        - Agent.OS -equals Linux
    ${{ else }}:
      vmImage: 'ubuntu-latest'
  jobs:
    - job: plan
      displayName: 'terraform plan'
      steps:
        - checkout: self

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: '$(TF_VERSION)'

        - task: TerraformTaskV4@4
          displayName: 'terraform init + plan'
          inputs:
            provider: 'azurerm' 
            command: 'init'
            backendServiceArm: 'azurerm-dev-oidc'
            backendAzureRmResourceGroupName: 'rg-tfstate-dev'
            backendAzureRmStorageAccountName: 'sttfstatedevuaen'
            backendAzureRmContainerName: 'tfstate'
            backendAzureRmKey: 'dev-uaen.tfstate'
            workingDirectory: '$(Build.SourcesDirectory)/Terraform/envs/dev'

        - task: TerraformTaskV4@4
          displayName: 'terraform plan'
          inputs:
            provider: 'azurerm' 
            command: 'plan'
            backendServiceArm: 'azurerm-dev-oidc'
            workingDirectory: '$(System.DefaultWorkingDirectory)/Terraform/envs/dev'
###############################################################################
# Apply stage - manual approval via environment, fetch backend, init, apply
###############################################################################
- stage: Apply
  displayName: 'Terraform Apply ($(targetEnv))'
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  pool:
    ${{ if parameters.useSelfHostedAgents }}:
      name: ${{ parameters.selfHostedPoolName }}
      demands:
        - Agent.OS -equals Linux
    ${{ else }}:
      vmImage: 'ubuntu-latest'
  jobs:
    - deployment: apply
      displayName: 'terraform apply'
      environment: '$(APPROVAL_ENV)'
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: '$(TF_VERSION)'

              - download: current
                artifact: tfplan-$(targetEnv)

              - task: AzureKeyVault@2
                displayName: 'Fetch backend config from $(BACKEND_KV_NAME)'
                inputs:
                  azureSubscription: 'azurerm-dev-oidc'
                  KeyVaultName: '$(BACKEND_KV_NAME)'
                  SecretsFilter: 'tfstate-rg,tfstate-sa,tfstate-container,tfstate-key'
                  RunAsPreJob: false

              - task: AzureCLI@2
                displayName: 'terraform init + apply'
                inputs:
                  azureSubscription: 'azurerm-dev-oidc'
                  scriptType: bash
                  scriptLocation: inlineScript
                  addSpnToEnvironment: true
                  inlineScript: |
                    set -e
                    cd $(WORKING_DIR)
                    cp $(Pipeline.Workspace)/tfplan-$(targetEnv)/tfplan ./tfplan

                    export ARM_USE_OIDC=true
                    export ARM_CLIENT_ID=$servicePrincipalId
                    export ARM_OIDC_TOKEN=$idToken
                    export ARM_TENANT_ID=$tenantId
                    export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                    terraform init \
                      -backend-config="resource_group_name=$(tfstate-rg)" \
                      -backend-config="storage_account_name=$(tfstate-sa)" \
                      -backend-config="container_name=$(tfstate-container)" \
                      -backend-config="key=$(tfstate-key)" \
                      -backend-config="use_oidc=true" \
                      -reconfigure

                    terraform apply -input=false -auto-approve tfplan
