###############################################################################
# Azure DevOps Pipeline: Infrastructure (Terraform)
#
# Single root module at terraform/ with per-env tfvars at terraform/envs/.
# Backend coordinates (rg / storage account / container / state-blob key) are
# pulled from a per-env bootstrap Key Vault at init time -- nothing about the
# state location is hard-coded in this YAML or in source control.
#
# Stages:
#   - Validate : fmt, validate, tflint, tfsec, checkov
#   - Plan     : fetch backend coords from KV -> init -> plan -> publish
#   - Apply    : manual approval (Azure DevOps environment), download plan,
#                fetch backend coords from KV -> init -> apply
#
# Auth: Workload Identity Federation (OIDC) via per-env service connections.
# No long-lived secrets in the pipeline.
###############################################################################

parameters:
  - name: targetEnv
    displayName: 'Target environment'
    type: string
    default: 'dev'
    values:
      - dev
      - staging
      - prod

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - pipelines/azure-pipelines-terraform.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**

variables:
  - name: TF_VERSION
    value: '1.7.5'
  - name: TF_ROOT
    value: '$(System.DefaultWorkingDirectory)/terraform'

  # Per-env values resolved from the queue-time parameter.
  - name: targetEnv
    value: ${{ parameters.targetEnv }}
  - name: SERVICE_CONNECTION
    value: 'azurerm-${{ parameters.targetEnv }}-oidc'
  - name: APPROVAL_ENV
    value: '${{ parameters.targetEnv }}-infra'
  - name: VAR_FILE
    value: 'envs/${{ parameters.targetEnv }}.tfvars'

  # Bootstrap Key Vault holding the Terraform backend coordinates for this env.
  # Created in advance per env (see docs/deployment-guide.md § 2). The service
  # principal behind $(SERVICE_CONNECTION) needs "Key Vault Secrets User" on it.
  #
  # Expected secret names (created by the bootstrap script):
  #   tfstate-rg        -> backend resource_group_name
  #   tfstate-sa        -> backend storage_account_name
  #   tfstate-container -> backend container_name
  #   tfstate-key       -> backend blob key (state file path)
  - name: BACKEND_KV_NAME
    value: 'kv-tfstate-${{ parameters.targetEnv }}'

pool:
  vmImage: 'ubuntu-latest'

stages:
###############################################################################
# Validate stage - linting and security scans (env-agnostic, no backend)
###############################################################################
- stage: Validate
  displayName: 'Validate & Scan'
  jobs:
    - job: validate
      displayName: 'fmt / validate / tflint / tfsec / checkov'
      steps:
        - checkout: self
          fetchDepth: 1

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: '$(TF_VERSION)'

        - script: terraform fmt -check -recursive
          displayName: 'terraform fmt -check'
          workingDirectory: '$(TF_ROOT)'

        - script: |
            cd $(TF_ROOT)
            terraform init -backend=false
            terraform validate
          displayName: 'terraform init (no backend) + validate'

        - script: |
            curl -sL https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip -o tflint.zip
            unzip -o tflint.zip
            sudo mv tflint /usr/local/bin/
            tflint --init
            tflint --recursive
          displayName: 'tflint'
          workingDirectory: '$(TF_ROOT)'

        - script: |
            curl -sL https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o /usr/local/bin/tfsec
            chmod +x /usr/local/bin/tfsec
            tfsec --soft-fail $(TF_ROOT)
          displayName: 'tfsec'

        - script: |
            pip install --quiet checkov
            checkov -d $(TF_ROOT) --quiet --soft-fail
          displayName: 'checkov'

###############################################################################
# Plan stage - fetch backend config from KV, init, plan, publish artifact
###############################################################################
- stage: Plan
  displayName: 'Terraform Plan ($(targetEnv))'
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - job: plan
      displayName: 'terraform plan'
      steps:
        - checkout: self

        - task: TerraformInstaller@1
          inputs:
            terraformVersion: '$(TF_VERSION)'

        # Pull Terraform backend coordinates from Key Vault. Secrets are
        # exposed as pipeline (secret) variables of the same name.
        - task: AzureKeyVault@2
          displayName: 'Fetch backend config from $(BACKEND_KV_NAME)'
          inputs:
            azureSubscription: '$(SERVICE_CONNECTION)'
            KeyVaultName: '$(BACKEND_KV_NAME)'
            SecretsFilter: 'tfstate-rg,tfstate-sa,tfstate-container,tfstate-key'
            RunAsPreJob: false

        - task: AzureCLI@2
          displayName: 'terraform init + plan'
          inputs:
            azureSubscription: '$(SERVICE_CONNECTION)'
            scriptType: bash
            scriptLocation: inlineScript
            addSpnToEnvironment: true
            inlineScript: |
              set -e
              cd $(TF_ROOT)

              export ARM_USE_OIDC=true
              export ARM_CLIENT_ID=$servicePrincipalId
              export ARM_OIDC_TOKEN=$idToken
              export ARM_TENANT_ID=$tenantId
              export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

              terraform init \
                -backend-config="resource_group_name=$(tfstate-rg)" \
                -backend-config="storage_account_name=$(tfstate-sa)" \
                -backend-config="container_name=$(tfstate-container)" \
                -backend-config="key=$(tfstate-key)" \
                -backend-config="use_oidc=true" \
                -reconfigure

              terraform plan \
                -var-file=$(VAR_FILE) \
                -out=tfplan \
                -input=false \
                -no-color | tee plan.txt

        - publish: $(TF_ROOT)/tfplan
          artifact: tfplan-$(targetEnv)
          displayName: 'Publish tfplan'

        - publish: $(TF_ROOT)/plan.txt
          artifact: plan-text-$(targetEnv)
          displayName: 'Publish plan summary'

###############################################################################
# Apply stage - manual approval via environment, fetch backend, init, apply
###############################################################################
- stage: Apply
  displayName: 'Terraform Apply ($(targetEnv))'
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
    - deployment: apply
      displayName: 'terraform apply'
      environment: '$(APPROVAL_ENV)'        # configure approvers / checks per env
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self

              - task: TerraformInstaller@1
                inputs:
                  terraformVersion: '$(TF_VERSION)'

              - download: current
                artifact: tfplan-$(targetEnv)

              # Pull backend coordinates from Key Vault for the apply job too
              # (each job runs on a fresh agent, so secrets don't carry over).
              - task: AzureKeyVault@2
                displayName: 'Fetch backend config from $(BACKEND_KV_NAME)'
                inputs:
                  azureSubscription: '$(SERVICE_CONNECTION)'
                  KeyVaultName: '$(BACKEND_KV_NAME)'
                  SecretsFilter: 'tfstate-rg,tfstate-sa,tfstate-container,tfstate-key'
                  RunAsPreJob: false

              - task: AzureCLI@2
                displayName: 'terraform init + apply'
                inputs:
                  azureSubscription: '$(SERVICE_CONNECTION)'
                  scriptType: bash
                  scriptLocation: inlineScript
                  addSpnToEnvironment: true
                  inlineScript: |
                    set -e
                    cd $(TF_ROOT)
                    cp $(Pipeline.Workspace)/tfplan-$(targetEnv)/tfplan ./tfplan

                    export ARM_USE_OIDC=true
                    export ARM_CLIENT_ID=$servicePrincipalId
                    export ARM_OIDC_TOKEN=$idToken
                    export ARM_TENANT_ID=$tenantId
                    export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                    terraform init \
                      -backend-config="resource_group_name=$(tfstate-rg)" \
                      -backend-config="storage_account_name=$(tfstate-sa)" \
                      -backend-config="container_name=$(tfstate-container)" \
                      -backend-config="key=$(tfstate-key)" \
                      -backend-config="use_oidc=true" \
                      -reconfigure

                    terraform apply -input=false -auto-approve tfplan
