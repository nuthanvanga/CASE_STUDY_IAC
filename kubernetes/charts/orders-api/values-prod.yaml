# Production overrides
replicaCount: 3

ingress:
  enabled: true
  host: orders.example.com
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "100"

hpa:
  minReplicas: 3
  maxReplicas: 20

pdb:
  minAvailable: 2

persistence:
  size: 20Gi

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

topologySpreadConstraints:
  enabled: true

env:
  ASPNETCORE_URLS: "http://+:8080"
  ASPNETCORE_ENVIRONMENT: "Production"
